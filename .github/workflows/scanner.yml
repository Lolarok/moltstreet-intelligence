name: MoltStreet Intelligence Scanner

on:
  schedule:
    # Run daily at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scanner
        env:
          SMTP_PASSWORD: ${{ secrets.MAIL_APPPASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd moltstreet-intelligence
          python3 src/main.py --dashboard --email

      - name: Commit dashboard data
        run: |
          cd moltstreet-intelligence
          git config user.name "MoltStreet Bot"
          git config user.email "bot@moltstreet.dev"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "auto: update dashboard data $(date -u +%Y-%m-%d)"
          git push
