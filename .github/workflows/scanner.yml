name: MoltStreet Intelligence Scanner

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scanner
        env:
          SMTP_PASSWORD: ${{ secrets.MAIL_APPPASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 src/main.py --dashboard --email

      - name: Commit dashboard data
        run: |
          git config user.name "MoltStreet Bot"
          git config user.email "bot@moltstreet.dev"
          git add -A
          git diff --staged --quiet || git commit -m "auto: update dashboard $(date -u +%Y-%m-%d)"
          git push
